[project]
name = "wagon-monitor"
version = "0.1.0"
description = "Multi-tenant SaaS for railway wagon tracking"
requires-python = ">=3.13"
dependencies = [
    "fastapi[standard]>=0.115.12",
    "sqlalchemy[asyncio]>=2.0.40",
    "asyncpg>=0.31.0",
    "alembic>=1.15.2",
    "pydantic>=2.11.1",
    "pydantic-settings>=2.8.1",
    "pyjwt>=2.10.1",
    "bcrypt>=4.3.0",
    "email-validator>=2.2.0",
    "structlog>=25.1.0",
    "httpx>=0.28.1",
]

[dependency-groups]
lint = [
    "pre-commit>=4.2.0",
    "ruff>=0.11.2",
]
test = [
    "pytest>=8.3.5",
    "pytest-asyncio>=0.26.0",
    "pytest-cov>=6.1.0",
    "factory-boy>=3.3.3",
    "testcontainers[postgres]>=4.9.1",
    "httpx>=0.28.1",
]
typing = [
    "mypy>=1.15.0",
    "types-pyjwt>=1.7.1",
]


[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "C",    # flake8-comprehensions
    "B",    # flake8-bugbear
    "TID",  # flake8-tidy-imports
    "T20",  # flake8-print
    "S",    # flake8-bandit
    "UP",   # pyupgrade
    "I",    # isort
    "SIM",  # flake8-simplify
]
ignore = [
    "B008",   # function calls in argument defaults — needed for FastAPI Depends()
    "UP046",  # generic class uses Generic subclass
    "UP047",  # generic function should use type parameters
]

[tool.ruff.lint.per-file-ignores]
"tests/**.py" = ["S"]                # asserts/SQL in tests are fine
"alembic/versions/*.py" = ["E501"]   # auto-generated, long lines ok

[tool.ruff.lint.isort]
known-local-folder = ["app", "tests"]


[tool.mypy]
files = ["app"]
plugins = ["pydantic.mypy"]
ignore_missing_imports = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false


[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q --tb=short"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
markers = [
    "smoke: marks tests as smoke tests"
]


[tool.coverage.run]
source = ["app"]
